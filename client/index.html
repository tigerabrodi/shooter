<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shooter</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 122, 89, 0.18),
            transparent 32%
          ),
          linear-gradient(180deg, #08101d 0%, #101826 100%);
        color: #f8fafc;
        font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .shell {
        position: relative;
        width: min(100vw - 24px, 960px);
        padding: 12px;
      }
      #hud {
        position: absolute;
        top: 24px;
        left: 24px;
        z-index: 1;
        padding: 8px 12px;
        background: rgba(8, 16, 29, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        font-size: 14px;
        letter-spacing: 0.04em;
        backdrop-filter: blur(8px);
      }
      canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 3;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div id="hud"></div>
      <canvas id="game" width="800" height="600"></canvas>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
